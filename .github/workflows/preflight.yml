name: Preflight

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "Screenshots/**"
  push:
    branches:
      - main

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode 26
        run: |
          # Use Xcode 26.2 to match local development (iOS 26 / Xcode 26)
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          echo "Using: $(xcodebuild -version)"

      - name: Get Simulator
        id: sim
        run: |
          # List available iOS simulators and pick the best one
          echo "Available iPhone simulators:"
          xcrun simctl list devices available | grep "iPhone" | head -10

          # Prefer iPhone 17 Pro Max (iOS 26), fall back to iPhone 16
          DEVICE=$(xcrun simctl list devices available | grep -E "iPhone 17 Pro Max" | head -1 | sed 's/(.*//' | xargs || true)
          if [ -z "$DEVICE" ]; then
            DEVICE=$(xcrun simctl list devices available | grep -E "iPhone 17 Pro[^M]" | head -1 | sed 's/(.*//' | xargs || true)
          fi
          if [ -z "$DEVICE" ]; then
            DEVICE=$(xcrun simctl list devices available | grep -E "iPhone 16 Pro Max" | head -1 | sed 's/(.*//' | xargs || true)
          fi
          if [ -z "$DEVICE" ]; then
            DEVICE="iPhone 16"
          fi

          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "✅ Using simulator: $DEVICE"

      - name: Run preflight checks
        env:
          OPEN_CONE_TEST_DESTINATION: "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}"
        run: |
          chmod +x scripts/preflight_check.sh
          ./scripts/preflight_check.sh
