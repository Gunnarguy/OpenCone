name: Preflight

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "Screenshots/**"
  push:
    branches:
      - main

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || echo "/Applications/Xcode.app")
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          echo "Using: $(xcodebuild -version | head -1)"

      - name: Get Simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [0-9]+ Pro' | head -1 | xargs)
          [ -z "$DEVICE" ] && DEVICE=$(xcrun simctl list devices available | grep -oE 'iPhone [^(]+' | head -1 | xargs)
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEVICE"

      - name: Run preflight checks
        env:
          OPEN_CONE_TEST_DESTINATION: "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}"
        run: |
          chmod +x scripts/preflight_check.sh
          ./scripts/preflight_check.sh
