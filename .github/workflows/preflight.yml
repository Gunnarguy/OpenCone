name: Preflight

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "Screenshots/**"
  push:
    branches:
      - main

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: macos-15
    env:
      # Use iOS 26 simulator with Xcode 26
      OPEN_CONE_TEST_DESTINATION: "platform=iOS Simulator,name=iPhone 16,OS=26.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run preflight checks
        run: |
          chmod +x scripts/preflight_check.sh
          ./scripts/preflight_check.sh
